name: TravelWorld

options:
  bundleIdPrefix: com.wander
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES

# The App Group lets the main app share a small data snapshot with the widgets.
# Replace "group.com.wander.travelworld" with your own if you change the bundle prefix.

# Mapbox powers the 3D globe on the main screen.
# Downloading the SDK requires a secret token with the Downloads:Read scope in ~/.netrc
# (see README). The public token goes in MapboxConfig.swift.
packages:
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios.git
    # 11.3.0 is the last release targeting Xcode 15.2 / Swift 5.9. Later versions
    # (11.5+) use `internal import`, which needs Xcode 16 / Swift 6. Bump this once
    # you move to Xcode 16.
    exactVersion: "11.3.0"

targets:
  TravelWorld:
    type: application
    platform: iOS
    sources:
      - path: TravelWorld
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wander.travelworld
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Wander
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Your location is only used to center the map — nothing is tracked or stored."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Choose photos to remember the places you have visited."
    entitlements:
      path: TravelWorld/TravelWorld.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.wander.travelworld
    dependencies:
      - target: TravelWorldWidgets
      - package: MapboxMaps

  TravelWorldWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: TravelWorldWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wander.travelworld.widgets
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: TravelWorldWidgets/Info.plist
      properties:
        CFBundleDisplayName: Wander
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TravelWorldWidgets/TravelWorldWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.wander.travelworld
